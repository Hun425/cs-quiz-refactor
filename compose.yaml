services:
  postgres:
    image: postgres:17-alpine
    container_name: cs-quiz-postgres
    environment:
      POSTGRES_DB: cs_quiz
      POSTGRES_USER: csquiz
      POSTGRES_PASSWORD: csquiz
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U csquiz -d cs_quiz"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
