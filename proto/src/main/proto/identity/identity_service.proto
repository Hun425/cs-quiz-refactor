syntax = "proto3";

package csquiz.identity.v1;

option java_multiple_files = true;
option java_package = "com.csquiz.proto.identity.v1";

enum OAuthProvider {
  OAUTH_PROVIDER_UNSPECIFIED = 0;
  OAUTH_PROVIDER_GOOGLE = 1;
}

enum MemberRole {
  MEMBER_ROLE_UNSPECIFIED = 0;
  MEMBER_ROLE_USER = 1;
  MEMBER_ROLE_ADMIN = 2;
}

service IdentityService {
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc ChangeNickname(ChangeNicknameRequest) returns (ChangeNicknameResponse);
  rpc GetMember(GetMemberRequest) returns (GetMemberResponse);
}

message RegisterRequest {
  OAuthProvider provider = 1;
  string provider_user_id = 2;
  string email = 3;
  string nickname = 4;
}

message RegisterResponse {
  string member_id = 1;
}

message ChangeNicknameRequest {
  string member_id = 1;
  string new_nickname = 2;
}

message ChangeNicknameResponse {}

message GetMemberRequest {
  string member_id = 1;
}

message GetMemberResponse {
  string member_id = 1;
  OAuthProvider provider = 2;
  string email = 3;
  string nickname = 4;
  MemberRole role = 5;
  int64 created_at = 6;
}
