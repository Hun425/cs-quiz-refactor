syntax = "proto3";

package csquiz.ranking.v1;

option java_multiple_files = true;
option java_package = "com.csquiz.proto.ranking.v1";

enum RankingScope {
  RANKING_SCOPE_UNSPECIFIED = 0;
  RANKING_SCOPE_GLOBAL = 1;
  RANKING_SCOPE_CATEGORY = 2;
}

enum RankingPeriod {
  RANKING_PERIOD_UNSPECIFIED = 0;
  RANKING_PERIOD_WEEKLY = 1;
  RANKING_PERIOD_MONTHLY = 2;
  RANKING_PERIOD_ALL_TIME = 3;
}

service RankingService {
  rpc GetRanking(GetRankingRequest) returns (GetRankingResponse);
  rpc GetMemberRank(GetMemberRankRequest) returns (GetMemberRankResponse);
}

message GetRankingRequest {
  RankingScope scope = 1;
  RankingPeriod period = 2;
  string category_id = 3;
  int32 limit = 4;
}

message GetRankingResponse {
  RankingScope scope = 1;
  RankingPeriod period = 2;
  string category_id = 3;
  repeated RankEntryItem entries = 4;
}

message RankEntryItem {
  string member_id = 1;
  int64 score = 2;
  int32 rank = 3;
}

message GetMemberRankRequest {
  string member_id = 1;
  RankingScope scope = 2;
  RankingPeriod period = 3;
  string category_id = 4;
}

message GetMemberRankResponse {
  bool found = 1;
  string member_id = 2;
  int64 score = 3;
  int32 rank = 4;
}
